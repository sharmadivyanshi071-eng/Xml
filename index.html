<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background-color: white; border-radius: 8px; display: flex; 
                justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .cell:hover { background-color: #e0e0e0; }
        #status { margin-top: 20px; font-size: 1.5rem; color: #333; }
        button { margin-top: 20px; padding: 10px 20px; font-size: 1rem; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div id="status">Player X's Turn</div>
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>
    <button onclick="resetGame()">Restart Game</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let active = true;

        function makeMove(i) {
            if (board[i] === "" && active) {
                board[i] = currentPlayer;
                const cells = document.getElementsByClassName('cell');
                cells[i].innerText = currentPlayer;
                cells[i].style.color = currentPlayer === "X" ? "#ff4757" : "#2f3542";
                
                if (checkWin()) {
                    document.getElementById('status').innerText = `🎉 Player ${currentPlayer} Wins!`;
                    active = false;
                    return;
                }
                if (!board.includes("")) {
                    document.getElementById('status').innerText = "It's a Draw! 🤝";
                    active = false;
                    return;
                }

                currentPlayer = currentPlayer === "X" ? "O" : "X";
                document.getElementById('status').innerText = `Player ${currentPlayer}'s Turn`;
            }
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(s => board[s[0]] && board[s[0]] === board[s[1]] && board[s[0]] === board[s[2]]);
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            active = true;
            currentPlayer = "X";
            document.querySelectorAll('.cell').forEach(c => c.innerText = "");
            document.getElementById('status').innerText = "Player X's Turn";
        }
    </script>
</body>
</html>
